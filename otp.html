<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Meta Description -->
  <meta name="description" content="Verify your email address to complete your account setup">
  <title>Verify Your Email | OTP</title>

  <!-- icofont-css-link -->
  <link rel="stylesheet" href="css/icofont.min.css">
  <!-- Owl-Carosal-Style-link -->
  <link rel="stylesheet" href="css/owl.carousel.min.css">
  <!-- Bootstrap-Style-link -->
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <!-- Coustome-Style-link -->
  <link rel="stylesheet" href="css/style.css">
  <!-- Responsive-Style-link -->
  <link rel="stylesheet" href="css/responsive.css">
  <!-- Favicon -->
  <link rel="shortcut icon" href="assets/images/logo/fav-icon.png" type="image/x-icon">
  <!-- webfont-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">

  <style>
    .otp-input-group {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    
    .otp-input {
      width: 60px;
      height: 60px;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background-color: #f8fafc;
      transition: all 0.3s ease;
    }
    
    .otp-input:focus {
      border-color: #220750;
      background-color: white;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
      outline: none;
    }
    
    .resend-otp {
      text-align: center;
      margin-top: 1.5rem;
      color: #64748b;
    }
    
    .resend-otp a {
      color: #220750;
      text-decoration: none;
      font-weight: 600;
    }
    
    .resend-otp a:hover {
      text-decoration: underline;
    }
    
    .email-address {
      color: #220750;
      font-weight: 600;
    }
    
    .timer {
      font-weight: 600;
      color: #ef4444;
    }
    .navbar-brand{
       align-items: center;
    width: 100%;
    text-align: center;
    margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <!-- Page-wrapper-Start -->
  <div class="page_wrapper">

    <div class="full_bg">

      <section class="signup_section">
        <div class="container">

          <!-- OTP Verification Form -->
          <div class="form_block">

            <!-- content image side -->
            <div class="side_screen">
              <div class="section_title">
                <h3>Just one more step to complete your account</h3>
                <p>Verify your email address to get started with all features.</p>
              </div>

              <div class="scrren">
                <img src="assets/images/mockups/signin-1.png" alt="image">
              </div>
            </div>

            <!-- Form side -->
            <div class="form_side">
                  <a class="navbar-brand" href="index.html">
              <img src="assets/images/logo/fintle_logo.png" alt="image">
            </a>
              <div class="section_title">
                <h4><span>Verify</span> your email</h4>
                <p>We've sent a 6-digit verification code to <span class="email-address">user@example.com</span></p>
              </div>
              <form id="otpForm">
                <div class="otp-input-group">
                  <input type="text" class="form-control otp-input" maxlength="1" required>
                  <input type="text" class="form-control otp-input" maxlength="1" required>
                  <input type="text" class="form-control otp-input" maxlength="1" required>
                  <input type="text" class="form-control otp-input" maxlength="1" required>
                  <input type="text" class="form-control otp-input" maxlength="1" required>
                  <input type="text" class="form-control otp-input" maxlength="1" required>
                </div>
                
                <div class="btn_block">
                  <button type="submit" class="btn puprple_btn ml-0">Verify & Continue</button>
                  <div class="btn_bottom"></div>
                </div>
                
                <div class="resend-otp">
                  <p>Didn't receive the code? <a href="#" id="resendLink">Resend</a> <span id="timer" class="timer">(02:00)</span></p>
                </div>
                
                <div class="sign_in_here">
                  <p>Wrong email? <a href="signup.html">Go back</a></p>
                </div>
              </form>
            </div>

          </div>

        </div>
      </section>

    </div>

  </div>

  <!-- Page-wrapper-Start -->
  <div class="page_wrapper">

    <!-- go top button -->
    <div class="go_top" id="Gotop">
      <span><i class="icofont-arrow-up"></i></span>
    </div>

  </div>

  <!-- Page-wrapper-End-->

  <!-- Jquery-js-Link -->
  <script src="js/jquery.js"></script>
  <!-- owl-js-Link -->
  <script src="js/owl.carousel.min.js"></script>
  <!-- bootstrap-js-Link -->
  <script src="js/bootstrap.min.js"></script>
  <!-- main-js-Link -->
  <script src="js/main.js"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // OTP input navigation
      const otpInputs = document.querySelectorAll('.otp-input');
      
      otpInputs.forEach((input, index) => {
        // Move to next input when a digit is entered
        input.addEventListener('input', function() {
          if (this.value.length === 1 && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
          }
        });
        
        // Handle backspace
        input.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
            otpInputs[index - 1].focus();
          }
        });
        
        // Only allow numbers
        input.addEventListener('keypress', function(e) {
          if (!/[0-9]/.test(e.key)) {
            e.preventDefault();
          }
        });
      });
      
      // Form submission
      document.getElementById('otpForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Collect OTP values
        let otp = '';
        otpInputs.forEach(input => {
          otp += input.value;
        });
        
        // Validate OTP (in a real app, you would send this to your backend)
        if (otp.length === 6) {
          // Show loading state
          const submitBtn = this.querySelector('.puprple_btn');
          submitBtn.textContent = 'Verifying...';
          submitBtn.disabled = true;
          
          // Simulate API call
          setTimeout(() => {
            // In a real app, you would check the OTP against what was sent
            // For demo purposes, we'll assume it's correct
            alert('Email verified successfully!');
            window.location.href = 'dashboard.html'; // Redirect to dashboard
          }, 1500);
        } else {
          alert('Please enter the complete 6-digit code');
        }
      });
      
      // Resend OTP functionality with timer
      let timeLeft = 120; // 2 minutes in seconds
      const timerElement = document.getElementById('timer');
      const resendLink = document.getElementById('resendLink');
      
      // Initially disable resend link
      resendLink.style.pointerEvents = 'none';
      resendLink.style.opacity = '0.5';
      
      // Update timer every second
      const timerInterval = setInterval(() => {
        timeLeft--;
        
        // Format time as mm:ss
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerElement.textContent = `(${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')})`;
        
        // Enable resend link when timer reaches 0
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          timerElement.textContent = '';
          resendLink.style.pointerEvents = 'auto';
          resendLink.style.opacity = '1';
        }
      }, 1000);
      
      // Resend OTP
      resendLink.addEventListener('click', function(e) {
        e.preventDefault();
        
        if (timeLeft <= 0) {
          // Reset timer
          timeLeft = 120;
          resendLink.style.pointerEvents = 'none';
          resendLink.style.opacity = '0.5';
          
          // Restart timer
          const newTimerInterval = setInterval(() => {
            timeLeft--;
            
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerElement.textContent = `(${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')})`;
            
            if (timeLeft <= 0) {
              clearInterval(newTimerInterval);
              timerElement.textContent = '';
              resendLink.style.pointerEvents = 'auto';
              resendLink.style.opacity = '1';
            }
          }, 1000);
          
          // In a real app, you would make an API call to resend the OTP
          alert('Verification code has been resent to your email');
        }
      });
    });
  </script>

</body>

</html>
